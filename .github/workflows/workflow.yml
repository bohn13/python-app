name: python-deployment
run-name: ${{github.actor}} - ${{github.ref_name}}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{github.workflow}}-${{ github.ref }}
  

jobs:
  python-ci:
    strategy:
      matrix:
        PythonVersion: [3.8, 3.9]
        OsType: [ubuntu-latest, windows-latest]

    name: Python CI
    runs-on: ${{matrix.OsType}}
    defaults:
      run:
        working-directory: ./src

    steps:

    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.PythonVersion }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.PythonVersion }}


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        pip install -r requirements.txt


    - name: Lint with flake8
      run: |
        cd ../
        flake8 . --show-source --statistics


    - name: Check Complexity
      run: |
        cd ../
        flake8 . --exit-zero --max-complexity=10 --statistics


    - name: Test with pytest
      run: |
        pytest -v --cov-report=term-missing --cov=. --cov-report=json


    - name: Upload python artifacts
      if: ${{ github.ref_name == 'main' }}
      uses: actions/upload-artifact@v4
      with:
        name: python-artifacts
        path: .


    - name: Upload helm artifacts
      if: ${{ github.ref_name == 'main' }}
      uses: actions/upload-artifact@v4
      with:
        name: helm-chart
        path: ${{ github.workspace }}/helm-charts

  build-image:
   name: Build and push Docker image
   needs: python-ci
   runs-on: ubuntu-latest
   if: ${{ github.ref_name == 'main' }}
   steps:
   - uses: actions/download-artifact@v4
     with:
       name: python-artifacts
       path: .


   - name: Login to Docker Hub
     uses: docker/login-action@v3
     with:
       username: ${{ vars.DOCKERUSERNAME }}
       password: ${{ secrets.DOCKER_HUB_SECRET }}


   - name: Build and push
     uses: docker/build-push-action@v5
     with:
       context: ./src
       push: true
       tags: ${{ vars.DOCKERUSERNAME }}/${{ vars.DOCKERIMAGENAME }}:${{ github.sha }}

  helm-ci:
    name: Helm CI
    needs: python-ci
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: .

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0

      - name: Lint Helm Chart
        run: helm lint ./kube2py/

      - name: Template Helm Chart
        run: helm template kube2py ./kube2py -f ./kube2py/values.yaml

      - name: Package Helm
        run: helm package ./kube2py --app-version ${{github.sha}}

      - name: Upload Helm Package
        uses: actions/upload-artifact@v4
        with:
          name: helm-package
          path: ./*.tgz

  deploy-helm-dev:
    name: Deploy Helm
    uses: ./.github/workflows/deployment-workflow.yml
    needs: [helm-ci, build-image]
    secrets: inherit
    with:
      environment: development
      version: ${{ github.sha }}

  deploy-helm-staging:
    name: Deploy Helm
    uses: ./.github/workflows/deployment-workflow.yml
    needs: deploy-helm-dev
    secrets: inherit
    with:
      helm-values-path: './kube2py/values/staging.yaml'
      helm-release-name: kube2py-staging
      environment: staging
      version: ${{ github.sha }}